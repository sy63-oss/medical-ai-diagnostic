# prometheus.yml — Medical AI Diagnostic Monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: medical-ai-diagnostic
    env: production

rule_files:
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: medical-diagnostic-api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics
    scheme: http

  - job_name: mlflow
    static_configs:
      - targets: [mlflow:5000]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
